# Existing privileged PR automation is intentionally isolated to these workflows:
# they do not checkout pull request head code, and they only comment or set status.
rules:
  dangerous-triggers:
    ignore:
      - semantic-pull-requests.yml
  # The release job checkout intentionally persists WOLFSTAR_TOKEN (no
  # persist-credentials: false) so changesets/action can push version-bump
  # commits, tags, and the release PR with that token.
  artipacked:
    ignore:
      - release.yml
